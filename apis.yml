aid: usg
name: USG
description: >-
  USG Corporation is a leading manufacturer of building products and innovative
  solutions for the construction industry. USG produces Sheetrock brand drywall,
  Durock cement board, Securock glass-mat sheathing, and a wide range of interior
  finishing systems. The company serves contractors, architects, and building
  professionals through its distributor network and provides digital tools and
  APIs to support the building and construction workflow.
